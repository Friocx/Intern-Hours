<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.2" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#4f46e5" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background base rounded card -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Outer ambient ring glow -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#glowGrad)" stroke-width="8" stroke-dasharray="15 10" />

  <!-- Inner glassmorphic attendance container with shadow -->
  <circle cx="256" cy="256" r="160" fill="#09090b" fill-opacity="0.45" stroke="#ffffff" stroke-opacity="0.15" stroke-width="6" filter="url(#shadow)" />

  <!-- Central Stylized Fingerprint + Clock Icon -->
  <g transform="translate(166, 166)">
    <!-- Clock Hands inside circular core -->
    <circle cx="90" cy="90" r="70" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="4" />
    <!-- Clock hands pointing at 10:10 -->
    <line x1="90" y1="90" x2="90" y2="45" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
    <line x1="90" y1="90" x2="130" y2="90" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
    
    <!-- Stylized Fingerprint ridges looping around -->
    <path d="M50,90 A40,40 0 0,1 130,90" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-opacity="0.8" />
    <path d="M30,90 A60,60 0 0,1 150,90" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-opacity="0.6" />
    <path d="M70,90 A20,20 0 0,1 110,90" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-opacity="0.9" />
  </g>
</svg>
